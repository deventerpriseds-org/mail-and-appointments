name: Deploy Web to Azure Static Web Apps

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - '.github/workflows/web-deploy.yml'
  workflow_dispatch:

env:
  RESOURCE_GROUP: EnterpriseDS_ResourceGRP
  STATIC_WEB_APP: enterpriseds-mail-web
  MS_APP_NAME: enterpriseds-mail-web
  FUNCTION_APP: enterpriseds-mail-api

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Resolve Microsoft sign-in client ID
        id: ms
        env:
          FALLBACK_MS_CLIENT_ID: ${{ secrets.MAIL_MS_CLIENT_ID }}
        run: |
          # Look up the dedicated Entra app by name (created by the "Provision
          # Entra App" workflow; requires Graph Application.ReadWrite.All on the
          # deploy SP). Fall back to the MAIL_MS_CLIENT_ID secret if the lookup
          # returns nothing, so the build never breaks.
          MS_ID=$(az ad app list --display-name "$MS_APP_NAME" --query "[0].appId" -o tsv 2>/dev/null || true)
          if [ -z "$MS_ID" ] || [ "$MS_ID" = "null" ]; then
            MS_ID="$FALLBACK_MS_CLIENT_ID"
            echo "Entra app lookup empty; using MAIL_MS_CLIENT_ID fallback (set: $([ -n "$MS_ID" ] && echo yes || echo no))."
          else
            echo "Resolved Microsoft client ID from Entra app '$MS_APP_NAME'."
          fi
          echo "client_id=$MS_ID" >> "$GITHUB_OUTPUT"

      - name: Install and Build
        env:
          VITE_MS_CLIENT_ID: ${{ steps.ms.outputs.client_id }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          # The web (Static Web App) and API (Function App) are separate origins,
          # so the frontend must call the API by absolute URL.
          VITE_API_BASE_URL: https://${{ env.FUNCTION_APP }}.azurewebsites.net
          # Shared Google redirect URI — registered ONCE in the Google OAuth client.
          # Every app uses this same value; new apps need no per-app Google console change.
          VITE_GOOGLE_REDIRECT_URI: https://victorious-field-096ac470f.7.azurestaticapps.net
        run: |
          cd web
          npm ci
          npm run build

      - name: Get Static Web App token
        id: swa_token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "$STATIC_WEB_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web/dist
          output_location: ""
          skip_app_build: true
