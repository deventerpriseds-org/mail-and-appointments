name: Azure Infrastructure Setup
# Run this manually after provisioning to create tables + set Function App env vars.
# Safe to re-run.

on:
  workflow_dispatch:

env:
  RESOURCE_GROUP: EnterpriseDS_ResourceGRP
  FUNCTION_APP: enterpriseds-mail-api
  STATIC_WEB_APP: enterpriseds-mail-web

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Create storage tables
        run: |
          CONN="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
          for table in EmailCalendarData AccountConfig; do
            az storage table create --name $table --connection-string "$CONN" || true
          done

      - name: Set Function App environment variables
        run: |
          az functionapp config appsettings set \
            --name "$FUNCTION_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --settings \
              "AZURE_STORAGE_CONNECTION_STRING=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
              "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              "NODE_ENV=production"

      - name: Allow the Static Web App origin (CORS)
        run: |
          # The web (Static Web App) calls the API (Function App) cross-origin,
          # so the Function App must allow the SWA origin.
          HOST=$(az staticwebapp show --name "$STATIC_WEB_APP" --resource-group "$RESOURCE_GROUP" --query "defaultHostname" -o tsv)
          ORIGIN="https://$HOST"
          echo "Allowing CORS origin: $ORIGIN"
          az functionapp cors add --name "$FUNCTION_APP" --resource-group "$RESOURCE_GROUP" --allowed-origins "$ORIGIN" || true
          echo "Current allowed origins:"
          az functionapp cors show --name "$FUNCTION_APP" --resource-group "$RESOURCE_GROUP" -o json

      - name: Verify tables
        run: |
          az storage table list \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            --query "[].name" -o tsv
